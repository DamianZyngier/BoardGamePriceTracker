name: Planszeo Price Tracker
on:
  schedule:
    - cron: '0 6 * * *'  # Codziennie o 6:00 UTC (7:00 CET)
  workflow_dispatch:  # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit results
        run: |
          git config user.name "Planszeo Bot"
          git config user.email "damian.zyngier@gmail.com"
          git add data/
          git commit -m "Update prices: $(date)" || echo "No changes"
          git push