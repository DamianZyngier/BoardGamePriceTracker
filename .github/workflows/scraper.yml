name: Daily Planszeo Scraper

on:
  schedule:
    # Runs every 6 hours, starting at 8 AM UTC
    - cron: '0 10,16,22,4 * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
      EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
      BGG_API_TOKEN: ${{ secrets.BGG_API_TOKEN }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x' # Use the latest Python 3 version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run scraper
      env:
        PYTHONPATH: .
      run: python -m src.main

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/stats.json data/last_checked_games.json docs/index.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update stats and GitHub Pages [skip ci]" && git push)